services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fcs-rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI (http://localhost:15672, guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: fcs-postgres
    environment:
      POSTGRES_USER: fcs
      POSTGRES_PASSWORD: fcs
      POSTGRES_DB: flashcrash
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcs -d flashcrash"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
